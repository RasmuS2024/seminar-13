name: Build, Test, Security Scan & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Build and test (incl. checkstyle)
        run: ./gradlew build

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dorny/paths-filter@v4.0.1
        id: changed-gradle-files
        with:
          filters: |
            gradle:
              - '**/*.gradle.kts'
              - '**/gradle-wrapper.properties'

      - uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Generate Gradle lockfiles for Trivy
        if: steps.changed-gradle-files.outputs.gradle == 'true'
        run: ./gradlew :space-api:dependencies :space-scheduler:dependencies :telemetry-service:dependencies --write-locks

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  push-docker:
    if: github.event_name == 'push'
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push space-api
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./space-api
          tags: |
            ghcr.io/rasmus2024/seminar13/space-api:latest
            ghcr.io/rasmus2024/seminar13/space-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true

      - name: Build and push space-scheduler
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./space-scheduler
          tags: |
            ghcr.io/rasmus2024/seminar13/space-scheduler:latest
            ghcr.io/rasmus2024/seminar13/space-scheduler:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true

  test-compose:
    if: github.event_name == 'push'
    needs: push-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          DB_NAME=space_db_test
          DB_USERNAME=space_user
          DB_PASSWORD=test_password_123
          EOF

      - name: Build and start services
        run: docker compose up -d

      - name: Wait for space-api
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/overview && break
            echo "Waiting for API... ($i)"
            sleep 3
          done
          curl --fail http://localhost:8080/api/overview || (echo "API not responding" && docker compose logs && exit 1)

      - name: Wait for space-scheduler
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8081/actuator/health && break
            echo "Waiting for scheduler... ($i)"
            sleep 3
          done
          curl --fail http://localhost:8081/actuator/health || (echo "Scheduler not responding" && docker compose logs && exit 1)

      - name: Cleanup
        if: always()
        run: docker compose down
