name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Build and test
        run: ./gradlew build

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  push-docker:
    if: github.event_name == 'push'
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

      - name: Push images with latest tag
        run: docker compose push

      - name: Tag and push with commit SHA
        run: |
          docker tag ghcr.io/rasmus2024/seminar11/space-api:latest ghcr.io/rasmus2024/seminar11/space-api:${{ github.sha }}
          docker tag ghcr.io/rasmus2024/seminar11/space-scheduler:latest ghcr.io/rasmus2024/seminar11/space-scheduler:${{ github.sha }}
          docker push ghcr.io/rasmus2024/seminar11/space-api:${{ github.sha }}
          docker push ghcr.io/rasmus2024/seminar11/space-scheduler:${{ github.sha }}

  test-compose:
    if: github.event_name == 'push'
    needs: push-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          DB_NAME=space_db_test
          DB_USERNAME=space_user
          DB_PASSWORD=test_password_123
          EOF

      - name: Build and start services
        run: |
          docker compose up -d
          sleep 35

      - name: Verify space-api health
        run: curl --fail http://localhost:8080/api/overview || (echo "API not responding" && docker compose logs && exit 1)

      - name: Verify space-scheduler
        run: curl --fail http://localhost:8081/actuator/health || (echo "Scheduler not responding" && docker compose logs && exit 1)

      - name: Cleanup
        if: always()
        run: docker compose down
