name: Build and Push Docker Images

on:
  push:
    branches:
      - seminar-9

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}/space-api
  SCHEDULER_IMAGE_NAME: ${{ github.repository }}/space-scheduler

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images with compose
        run: docker compose build

      - name: Tag and push space-api
        run: |
          docker tag space-api ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          docker tag space-api ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}

      - name: Tag and push space-scheduler
        run: |
          docker tag space-scheduler ${{ env.REGISTRY }}/${{ env.SCHEDULER_IMAGE_NAME }}:latest
          docker tag space-scheduler ${{ env.REGISTRY }}/${{ env.SCHEDULER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.SCHEDULER_IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.SCHEDULER_IMAGE_NAME }}:${{ github.sha }}


  test-compose:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: |
          docker compose up -d
          sleep 10   # даём время на старт

      - name: Verify space-api health
        run: curl --fail http://localhost:8080/api || (echo "API not responding" && docker compose logs && exit 1)

      - name: Verify space-scheduler
        run: curl --fail http://localhost:8081/api || (echo "Scheduler not responding" && docker compose logs && exit 1)

      - name: Cleanup
        if: always()
        run: docker compose down