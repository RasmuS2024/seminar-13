name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - seminar-9

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker compose build

      - name: Push images with latest tag
        run: docker compose push

      - name: Tag and push with commit SHA
        run: |
          docker tag ghcr.io/rasmus2024/seminar1/space-api:latest ghcr.io/rasmus2024/seminar1/space-api:${{ github.sha }}
          docker tag ghcr.io/rasmus2024/seminar1/space-scheduler:latest ghcr.io/rasmus2024/seminar1/space-scheduler:${{ github.sha }}
          docker push ghcr.io/rasmus2024/seminar1/space-api:${{ github.sha }}
          docker push ghcr.io/rasmus2024/seminar1/space-scheduler:${{ github.sha }}