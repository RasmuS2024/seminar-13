syntax = "proto3";

package telemetry;

option java_package = "org.example.telemetry.proto";
option java_multiple_files = true;

service TelemetryService {
  rpc StreamTelemetry(TelemetryRequest) returns (stream TelemetryUpdate);
}

message TelemetryRequest {
  int32 interval_ms = 1;
  uint64 satellite_id = 2;
}

message TelemetryUpdate {
  uint64 satellite_id = 1;
  int64 timestamp = 2;
  double temperature_inside = 3;
  double temperature_outside = 4;
}
