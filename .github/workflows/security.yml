name: Trivy Security Scan

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker compose build

      - name: Run Trivy vulnerability scanner for space-api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/rasmus2024/seminar1/space-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner for space-scheduler
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/rasmus2024/seminar1/space-scheduler:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'