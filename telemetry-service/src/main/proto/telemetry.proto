syntax = "proto3";

package telemetry;

option java_package = "org.example.telemetry.proto";
option java_multiple_files = true;

service TelemetryService {
  rpc StreamTelemetry(TelemetryRequest) returns (stream TelemetryUpdate);
}

message TelemetryRequest {
  string device_id = 1;
  repeated string metrics = 2;
  int32 interval_ms = 3;
  optional int32 duration_ms = 4;
}

message TelemetryUpdate {
  string device_id = 1;
  int64 timestamp = 2;
  map<string, MetricValue> metrics = 3;
}

message MetricValue {
  oneof value {
    double double_value = 1;
    int64 int_value = 2;
    string string_value = 3;
    bool bool_value = 4;
  }
}