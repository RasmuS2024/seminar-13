  name: Build and Push Docker Images

  on:
    push:
      branches:
        - main
        - seminar-9

  env:
    REGISTRY: ghcr.io
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  jobs:
    build-and-push:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write

      steps:
        - name: Checkout repository
          uses: actions/checkout@v5

        - name: Log in to GitHub Container Registry
          uses: docker/login-action@v4
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build images
          run: docker compose build

        - name: Push images with latest tag
          run: docker compose push

        - name: Tag and push with commit SHA
          run: |
            docker tag ghcr.io/rasmus2024/seminar1/space-api:latest ghcr.io/rasmus2024/seminar1/space-api:${{ github.sha }}
            docker tag ghcr.io/rasmus2024/seminar1/space-scheduler:latest ghcr.io/rasmus2024/seminar1/space-scheduler:${{ github.sha }}
            docker push ghcr.io/rasmus2024/seminar1/space-api:${{ github.sha }}
            docker push ghcr.io/rasmus2024/seminar1/space-scheduler:${{ github.sha }}

    test-compose:
      needs: build-and-push
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Build and start services
          run: |
            docker compose up -d
            sleep 35

        - name: Verify space-api health
          run: curl --fail http://localhost:8080/api || (echo "API not responding" && docker compose logs && exit 1)

        - name: Verify space-scheduler
          run: curl --fail http://localhost:8081/api || (echo "Scheduler not responding" && docker compose logs && exit 1)

        - name: Cleanup
          if: always()
          run: docker compose down
